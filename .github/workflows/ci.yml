name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project
        run: python -m pip install --upgrade pip build -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Validate agent skills
        run: python scripts/validate-skills.py

      - name: Audit dependencies
        if: matrix.python-version == '3.12'
        run: python -m pip_audit --local --progress-spinner off

      - name: Test
        run: python -m pytest --cov=linkscribe --cov=clients --cov-report=term-missing --cov-fail-under=80

      - name: Build distributions
        if: matrix.python-version == '3.12'
        run: python -m build
